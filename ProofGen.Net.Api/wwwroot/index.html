<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Ticket | API</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/StyleSheet.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white shadow-xl p-8 w-full max-w-lg">

        <h1 class="text-2xl font-semibold text-gray-800 mb-6 text-center flex items-center justify-center space-x-2">
            <span>Upload Invoice Ticket</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="square" stroke-linejoin="miter" d="M3 7.5A1.5 1.5 0 0 1 4.5 6H8v1.5a1.5 1.5 0 0 0 3 0V6h8.5A1.5 1.5 0 0 1 21 7.5v9A1.5 1.5 0 0 1 19.5 18H16v-1.5a1.5 1.5 0 0 0-3 0V18H4.5A1.5 1.5 0 0 1 3 16.5v-9Z" />
            </svg>
        </h1>

        <div class="border-t border-gray-300 my-4"></div>

        <section class="mt-4 space-y-6 overflow-y-auto rounded-lg scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-gray-100">
            <form id="uploadForm" enctype="multipart/form-data">

                <div class="mb-4">
                    <input type="text" id="invoiceBillet" name="invoiceBillet"
                           readonly
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-gray-100 text-gray-700 cursor-not-allowed focus:outline-none placeholder-gray-400 font-sams"
                           placeholder="" />
                </div>

                <div class="mb-4">
                    <input type="text" id="fullName" name="fullName" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent placeholder-gray-400 font-sams"
                           placeholder="Enter your full name" />
                </div>

                <div class="mb-4">
                    <input type="text" id="taxId" name="taxId" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent placeholder-gray-400 font-sams"
                           placeholder="Enter your Taxid reference" />
                </div>

                <div class="flex items-center space-x-4">
                    <label for="archivo"
                           class="bg-yellow-600 text-white py-2 px-4 rounded-lg cursor-pointer hover:bg-yellow-700 transition duration-200 flex items-center space-x-2">
                        <span>Select Ticket</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="M12 11v6" />
                            <path d="M9 14l3 3 3-3" />
                        </svg>
                    </label>
                    <span id="archivoSeleccionado" class="text-sm text-gray-600">No file selected. Formats: .png, .jpg/.jpeg, .svg</span>
                </div>

                <input id="archivo" name="archivo" type="file" required class="hidden">

                <button type="submit"
                        class="mt-4 w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200 flex justify-center items-center space-x-2">
                    <span>Send Invoice</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="7" width="18" height="10" rx="2" ry="2" />
                        <path d="M7 7v-3a2 2 0 012-2h6a2 2 0 012 2v3" />
                        <path d="M12 12v7" />
                        <path d="M8 16l4-4 4 4" />
                    </svg>
                </button>

            </form>

            <div id="resultado"
                 class="mt-4 space-y-6 max-h-60 overflow-y-auto pr-2 rounded-lg scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-gray-100">
                <!-- Barra de carga (inicialmente oculta) -->
                <div id="loadingBar" class="w-full max-w-md mx-auto hidden flex items-center gap-2 mb-4">
                    <svg id="spinnerIcon" class="animate-spin h-5 w-5 text-blue-500" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" />
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                    </svg>
                    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                        <div id="progressFill" class="bg-blue-500 h-3 w-0 transition-all duration-300 ease-out"></div>
                    </div>
                </div>

                <!-- Here the tickets will add -->

            </div>

            <div id="actionsTicket" class="mt-4 flex space-x-4 hidden">
                <button id="clearTickets"
                        class="flex-1 bg-red-500 text-white py-2 px-4 rounded-lg hover:bg-red-600 transition duration-200 flex items-center justify-center space-x-2">
                    <span>Clear</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                        <line x1="10" y1="11" x2="10" y2="17" />
                        <line x1="14" y1="11" x2="14" y2="17" />
                    </svg>
                </button>

                <button id="editTicket"
                        class="flex-1 bg-yellow-600 text-white py-2 px-4 rounded-lg hover:bg-yellow-700 transition duration-200 flex items-center justify-center space-x-2">
                    <span>Edit</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16.474 3.548a2.121 2.121 0 0 1 3 3L8.06 17.96a1 1 0 0 1-.45.26l-4 1a0.5 0.5 0 0 1-.61-.61l1-4a1 1 0 0 1 .26-.45L16.474 3.548z" />
                        <path d="M15 5l4 4" />
                    </svg>
                </button>

                <button id="downloadPdf"
                        class="flex-1 bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition duration-200 flex items-center justify-center space-x-2">
                    <span>PDF</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="16" width="18" height="4" rx="1.5" ry="1.5" />
                        <path d="M12 3v9" />
                        <path d="M8 12l4 4 4-4" />
                    </svg>
                </button>
            </div>

            <div id="registrationTicket" class="mt-4 flex space-x-4 hidden">

                <button id="addItem"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200 flex justify-center items-center space-x-2">
                    <span>Submit Ticket</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2l4 -4" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 6a2 2 0 0 1 2 -2h7l5 5v9a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2z" />
                    </svg>
                </button>

            </div>

        </section>

    </div>

    <div id="billingEditor" class="ml-8 bg-white shadow-xl p-8 w-full max-w-lg hidden">
        <!--Aquí se va cargar el componente para editar el ticket en caso de nuevos imputs manuales-->
        <div id="separator" class="border-t border-gray-300 my-4 hidden"></div>
        <button id="saveTicketEdition"
                class="w-full bg-yellow-600 text-white py-2 px-4 rounded-lg hover:bg-yellow-700 transition duration-200 flex justify-center items-center space-x-2 hidden">
            <span>Save Ticket</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2l4 -4" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 6a2 2 0 0 1 2 -2h7l5 5v9a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2z" />
            </svg>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
