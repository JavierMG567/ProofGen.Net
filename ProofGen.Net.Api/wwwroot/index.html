<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subir Ticket | API</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-lg">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 text-center">Subir Archivo de Ticket</h1>
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="flex items-center space-x-4">
                <label for="archivo"
                       class="bg-blue-600 text-white py-2 px-4 rounded-lg cursor-pointer hover:bg-blue-700 transition duration-200">
                    Seleccionar archivo
                </label>
                <span id="archivoSeleccionado" class="text-sm text-gray-600">Ningún archivo seleccionado</span>
            </div>
            <input id="archivo" name="archivo" type="file" required class="hidden">.
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                Enviar
            </button>
        </form>
        <button id="clearTickets"
                class="mt-4 w-full bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 transition duration-200">
            Limpiar Tickets
        </button>
        <div id="resultado" class="mt-6 space-y-6">
            <!-- Aquí se agregarán los tickets -->
        </div>
        <button id="downloadPdf"
                class="mt-4 w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition duration-200">
            Descargar Ticket en PDF
        </button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
